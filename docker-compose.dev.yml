version: '3.9'

services:

  db:
    image: postgres:16-alpine
    container_name: barbersaas_db_dev
    restart: always
    environment:
      POSTGRES_DB: barbersaas_db
      POSTGRES_USER: barbersaas_user
      POSTGRES_PASSWORD: barbersaas_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barbersaas_user -d barbersaas_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: barbersaas_api_dev
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    environment:
      POSTGRES_DB: barbersaas_db
      POSTGRES_USER: barbersaas_user
      POSTGRES_PASSWORD: barbersaas_pass
    volumes:
      - .:/app
      - /app/venv
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: